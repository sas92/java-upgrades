plugins {
    id 'java'
    id("com.diffplug.spotless") version "8.4.0"
}

group = 'com.sas.java'
version = '1.0'

repositories {
    mavenCentral()
}

spotless.java {
    googleJavaFormat()
    targetExclude("build/**")
}

tasks.named('build') {
    dependsOn('spotlessCheck')
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
}

test {
    useJUnitPlatform()
}